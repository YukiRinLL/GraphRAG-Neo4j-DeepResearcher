# Reporter 代理配置文件
# 负责基于收集的证据生成研究报告

# LLM 配置
llm:
  service: openai  # 使用的 LLM 服务提供商
  model: qwen3.5-plus  # 使用的模型名称
  openai_api_key: <OPENAI_API_KEY>  # OpenAI API 密钥
  openai_base_url: <OPENAI_BASE_URL>  # OpenAI API 基础 URL

# 生成配置
generation_config:
  stream: true  # 是否启用流式输出
  stream_options:
    include_usage: true  # 是否包含使用情况统计
  # 启用显式前缀缓存（自动从 openai_base_url 检测提供商）
  force_prefix_cache: true  # 是否强制使用前缀缓存
  # 支持的角色名称：system, user, assistant, tool, last_message
  prefix_cache_roles: [system, user, assistant, tool]  # 哪些角色的消息会被缓存
  extra_body:
    enable_thinking: true  # 是否启用思考模式
  # show_reasoning: true
  # reasoning_output: stdout

# 代理标签
tag: deep-research  # 代理的唯一标识符

# 提示词配置
prompt:
  root: prompts/  # 提示词文件的根目录
  agent: reporter  # 代理类型
  lang: en  # 语言（英语）
  family: gpt5  # 提示词家族

# 工具配置
tools:
  # 文件系统工具
  file_system:
    mcp: false  # 是否使用 MCP 协议
    include:  # 包含的工具功能
      - write_file  # 写入文件
      - read_file  # 读取文件
      - list_files  # 列出文件
      - replace_file_lines  # 替换文件行
  # 证据存储工具
  evidence_store:
    mcp: false  # 是否使用 MCP 协议
    evidence_dir: evidence  # 证据存储目录
    include:  # 包含的工具功能
      - load_index  # 加载索引
      - get_note  # 获取笔记
      - list_notes  # 列出笔记
      - get_analysis  # 获取分析
      - list_analyses  # 列出分析
  # 报告生成工具
  report_generator:
    mcp: false  # 是否使用 MCP 协议
    reports_dir: reports  # 报告存储目录
  # 插件
  plugins:
    - tools/evidence_tool.py  # 证据工具插件
    - tools/report_tool.py  # 报告工具插件

# 处理器
handler: time_handler  # 时间处理器

# 代码文件
code_file: reporter  # 代码文件名称

# 回调配置
callbacks:
  - callbacks/reporter_callback  # 报告回调

# 最大聊天轮数
max_chat_round: 36  # 最大聊天轮数

# 通过 ReporterCallback.on_generate_response 注入的轮次提醒。
round_reminder:
  enabled: true  # 是否启用轮次提醒
  remind_at_round: 34  # 在第 34 轮提醒

# 自我反思配置
self_reflection:
  enabled: true  # 是否启用自我反思
  max_retries: 3  # 最大重试次数
  min_retention_ratio: 0.6  # 最小保留比率
  post_report_guidance_enabled: true  # 是否启用报告后指导
  quality_check:  # 质量检查
    enabled: true  # 是否启用质量检查
    model: qwen3.5-plus  # 使用的模型名称

# 工具调用超时时间
tool_call_timeout: 300  # 工具调用超时时间（秒）

# 输出目录
output_dir: ./output  # 输出目录路径
